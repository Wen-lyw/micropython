name: Build Watch Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Custom Board Config
        uses: actions/checkout@v4
        with:
          path: custom_board

      - name: Checkout MicroPython (Locked to v1.24.1)
        uses: actions/checkout@v4
        with:
          repository: micropython/micropython
          ref: v1.24.1
          path: micropython

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      - name: Setup ESP-IDF v5.2.2
        shell: bash
        run: |
          git clone -b v5.2.2 --recursive https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32s3
        working-directory: micropython

      - name: Build mpy-cross
        run: |
          make -C mpy-cross
        working-directory: micropython

      - name: Copy Board Files
        run: |
          # 将你的板级文件夹复制到目标路径
          cp -r custom_board/ports/esp32/boards/LYW_WATCH_S3 micropython/ports/esp32/boards/

      - name: Build Firmware
        shell: bash
        run: |
          source ../../esp-idf/export.sh
          make submodules
          make BOARD=LYW_WATCH_S3 BOARD_VARIANT=SPIRAM_OCT
        working-directory: micropython/ports/esp32

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-32mb-nousb
          path: |
            micropython/ports/esp32/build-LYW_WATCH_S3-SPIRAM_OCT/firmware.bin
            micropython/ports/esp32/build-LYW_WATCH_S3-SPIRAM_OCT/bootloader/bootloader.bin
            micropython/ports/esp32/build-LYW_WATCH_S3-SPIRAM_OCT/partition_table/partition-table.bin
