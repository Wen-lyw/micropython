name: Build Watch Firmware

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.0.2 # 使用较新的 IDF
        target: esp32s3

    - name: Build Firmware
      run: |
        # 1. 编译 mpy-cross
        make -C mpy-cross
        
        # 2. 进入 ESP32 目录
        cd ports/esp32
        
        # 3. 编译您的板子 (LYW_WATCH_S3)
        # 注意：这里会使用我们刚才创建的板型
        make BOARD=LYW_WATCH_S3 SUBMODULES=1
        
    - name: Upload Firmware
      uses: actions/upload-artifact@v3
      with:
        name: firmware-32mb-nousb
        path: ports/esp32/build-LYW_WATCH_S3/firmware.bin
